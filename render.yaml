services:
  - type: worker
    name: coursehero-watcher
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python watcher.py
    envVars:
      - key: COOKIE_STRING
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLL_INTERVAL
        value: "15"
